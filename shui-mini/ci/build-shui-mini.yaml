name: build-shui-mini

# 触发：
#   1. 推 mini-v* 标签 → 跨平台构建并创建 GitHub Release
#   2. 手动触发 (workflow_dispatch) → 仅产出 Actions artifacts，不发 Release
#   3. shui-mini/ 目录或本 workflow 文件改动时跑 CI 验证（不传 artifact）
on:
  push:
    tags:
      - "mini-v*"
  pull_request:
    paths:
      - "shui-mini/**"
      - ".github/workflows/build-shui-mini.yaml"
  workflow_dispatch:

permissions:
  contents: write # 标签触发时用来创建 Release

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bin: shui-mini.exe
            archive: zip

          - label: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            bin: shui-mini
            archive: tar.gz

          - label: macos-x64
            runner: macos-13 # Intel runner
            target: x86_64-apple-darwin
            bin: shui-mini
            archive: tar.gz

          - label: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin: shui-mini
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            pkg-config

      - name: Build (release)
        run: cargo build -p shui-mini --release --target ${{ matrix.target }}

      - name: Compute paths
        id: paths
        shell: bash
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          ARTIFACT_NAME="shui-mini-${{ matrix.label }}"
          echo "bin_path=$BIN_PATH" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "${{ steps.paths.outputs.bin_path }}" -Destination $stage
          Copy-Item "shui-mini/README.md" -Destination $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "${{ steps.paths.outputs.artifact_name }}.zip"

      - name: Package (tar.gz, Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir stage
          cp "${{ steps.paths.outputs.bin_path }}" stage/
          cp shui-mini/README.md stage/
          chmod +x "stage/${{ matrix.bin }}"
          tar -C stage -czf "${{ steps.paths.outputs.artifact_name }}.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.artifact_name }}
          path: |
            ${{ steps.paths.outputs.artifact_name }}.zip
            ${{ steps.paths.outputs.artifact_name }}.tar.gz
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mini-v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          ls -la release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
